services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oms-backend-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: omsdb
      DB_USERNAME: omsuser
      DB_PASSWORD: omspassword
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "set -e;
             cp -a /usr/src/app/. /var/www/html/;
             php artisan migrate --force;
             php artisan storage:link || true;
             exec php-fpm"
    volumes:
      - app_data:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: oms-backend-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_data:/var/www/html:ro

  db:
    image: mysql:8.4
    container_name: oms-backend-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: omsdb
      MYSQL_USER: omsuser
      MYSQL_PASSWORD: omspassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
  app_data:
